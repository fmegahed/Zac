about_content: |
  I'm Fadel Megahed, a business analytics professional passionate about transforming data into actionable insights that drive strategic decision-making. Through my academic journey and hands-on projects, I've developed a strong foundation in leveraging data to solve complex business problems. My recent work exploring occupational and employment wage statistics demonstrates my commitment to uncovering meaningful patterns in real-world datasets that can inform workforce planning and compensation strategies.
  
  My technical expertise spans the full analytics lifecycle, from database design and data warehousing to advanced optimization techniques and interactive data visualization. I'm proficient in business intelligence tools and analytical methodologies that enable me to not only analyze data but also communicate findings effectively to diverse stakeholders. I believe that the most powerful analytics solutions are those that combine technical rigor with clear, compelling storytelling.
  
  I'm actively seeking opportunities where I can apply my analytical skills to tackle meaningful business challenges, whether through internships, full-time positions, or collaborative projects. I'm particularly interested in roles that allow me to work at the intersection of data analytics and strategic planning, where I can continue growing as an analytics professional while delivering measurable value to organizations.

content:
  - title: Projects
    layout: list
    content:
      - layout: top-middle
        title: Exploring the Occupational and Employment Wage Statistics
        description: |
          This personal project develops an interactive R Shiny application to explore and visualize Occupational and Employment Wage Statistics data. The application leverages R's data manipulation and visualization capabilities to enable users to analyze wage trends and employment patterns across different occupations and regions. This tool provides valuable insights for workforce planning, career research, and labor market analysis by making complex employment statistics more accessible and understandable.
          
          - Developed interactive R Shiny dashboard to visualize and analyze occupational wage statistics across multiple employment sectors and geographic regions
          - Engineered data processing pipeline using R to clean, transform, and aggregate Bureau of Labor Statistics employment wage data for statistical analysis
          - Created dynamic data visualization tools enabling users to explore wage trends, compare occupational categories, and identify employment patterns across demographics
          
          **Project Files:**
          - [app.R](https://github.com/fmegahed/Zac/blob/main/projects/exploring-the-occupational-and-employment-wage-sta/app.R)
